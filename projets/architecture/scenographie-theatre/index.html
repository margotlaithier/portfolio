    <title>Scénographie théâtre</title>
    <link rel="icon" href="../../../logo.svg" type="image/svg+xml" />
    <script>
        document.documentElement.classList.add('render-pending');
        window.addEventListener('load', () => {
            const reveal = () => requestAnimationFrame(() => {
                document.documentElement.classList.remove('render-pending');
            });
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(reveal, reveal);
            } else {
                reveal();
            }
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" as="style" crossorigin />

    <link rel="preload" href="../../../styles.css" as="style" />
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="../../../cms/portfolio-content.js" defer></script>
    <script src="../../../cms/render-site.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js" defer></script>
    <script src="../../../playfair-points.js" defer></script>
</head>
